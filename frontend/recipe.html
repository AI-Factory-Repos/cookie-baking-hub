<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Cookie recipe details – Cookie Baking Hub" />
  <title>Recipe – Cookie Baking Hub</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header>
    <nav class="nav-container" aria-label="Main navigation">
      <a href="index.html" class="nav-logo">🍪 Cookie<span>Hub</span></a>
      <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" role="list">
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#recipes">Recipes</a></li>
        <li><a href="beginner.html">Beginner Tips</a></li>
      </ul>
    </nav>
    <div class="nav-overlay" aria-hidden="true"></div>
  </header>

  <main>
    <a href="index.html" class="back-link btn btn-outline" style="margin-bottom:1.5rem;display:inline-block;">&larr; Back to Recipes</a>
    <div id="recipeContainer" class="recipe-detail" aria-live="polite"></div>
  </main>

  <footer>
    <p>&copy; <span id="year"></span> Cookie Baking Hub. Made with ❤️ and butter.</p>
  </footer>

  <script src="js/recipe.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // Mobile nav
    const toggle = document.querySelector('.nav-toggle');
    const navLinks = document.querySelector('.nav-links');
    const overlay = document.querySelector('.nav-overlay');

    function closeNav() {
      toggle.classList.remove('open');
      navLinks.classList.remove('open');
      overlay.classList.remove('open');
      toggle.setAttribute('aria-expanded', 'false');
    }

    toggle.addEventListener('click', () => {
      const open = navLinks.classList.toggle('open');
      toggle.classList.toggle('open', open);
      overlay.classList.toggle('open', open);
      toggle.setAttribute('aria-expanded', String(open));
    });

    overlay.addEventListener('click', closeNav);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeNav(); });
  </script>
</body>
</html>
