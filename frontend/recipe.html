<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipe – Cookie Baking Hub</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="site-logo">🍪 Cookie Baking Hub</a>
    </div>
  </header>

  <main class="container recipe-detail-page">
    <!-- Back link -->
    <nav class="breadcrumb" aria-label="Back navigation">
      <a href="index.html" class="back-link">← Back to all recipes</a>
    </nav>

    <!-- Loading state -->
    <div id="recipe-loading" class="state-message" role="status" aria-live="polite">Loading recipe…</div>

    <!-- Error state -->
    <div id="recipe-error" class="state-message state-message--error" role="alert" hidden></div>

    <!-- Recipe content -->
    <article id="recipe-content" hidden>

      <!-- ── HEADER ── -->
      <header class="recipe-header">
        <h1 id="recipe-name" class="recipe-title"></h1>
        <div class="recipe-meta">
          <span class="meta-badge" id="recipe-difficulty"></span>
          <span class="meta-item"><span class="meta-icon">⏱</span> Prep: <strong id="recipe-prep-time"></strong></span>
          <span class="meta-item"><span class="meta-icon">🔥</span> Cook: <strong id="recipe-cook-time"></strong></span>
          <span class="meta-item"><span class="meta-icon">⏳</span> Total: <strong id="recipe-total-time"></strong></span>
        </div>
        <p id="recipe-description" class="recipe-description"></p>
      </header>

      <div class="recipe-body">
        <!-- ── INGREDIENTS ── -->
        <section class="recipe-section ingredients-section" aria-labelledby="ingredients-heading">
          <h2 id="ingredients-heading">Ingredients</h2>
          <ul id="ingredients-list" class="ingredients-list"></ul>
        </section>

        <!-- ── INSTRUCTIONS ── -->
        <section class="recipe-section instructions-section" aria-labelledby="instructions-heading">
          <h2 id="instructions-heading">Instructions</h2>
          <ol id="instructions-list" class="instructions-list"></ol>
        </section>
      </div>

      <!-- ── BETWEEN-RECIPE NAVIGATION ── -->
      <nav class="recipe-pagination" aria-label="Recipe navigation">
        <button id="btn-prev" class="btn btn--outline" disabled>← Previous Recipe</button>
        <button id="btn-next" class="btn btn--outline" disabled>Next Recipe →</button>
      </nav>

    </article>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2024 Cookie Baking Hub</p>
    </div>
  </footer>

  <script src="js/recipe.js"></script>
</body>
</html>
