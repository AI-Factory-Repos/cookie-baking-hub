<!DOCTYPE html>

<head>

  <title>Cookie Baking Hub</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="site-logo">🍪 Cookie Baking Hub</a>

    <section class="page-hero">
      <h1>Cookie Recipes</h1>
