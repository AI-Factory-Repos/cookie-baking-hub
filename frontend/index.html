<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Cookie Baking Hub – discover delicious cookie recipes for every skill level." />
  <title>Cookie Baking Hub</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
</head>
<body>

  <header>
    <nav class="nav-container" aria-label="Main navigation">
      <a href="index.html" class="nav-logo">🍪 Cookie<span>Hub</span></a>
      <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" role="list">
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#recipes">Recipes</a></li>
        <li><a href="beginner.html">Beginner Tips</a></li>
      </ul>
    </nav>
    <div class="nav-overlay" aria-hidden="true"></div>
  </header>

  <section class="hero" aria-label="Hero">
    <h1>Bake Perfect Cookies Every Time</h1>
    <p>Browse our collection of tried-and-tested cookie recipes, from simple classics to creative creations.</p>
    <a href="#recipes" class="btn btn-accent">Explore Recipes</a>
  </section>

  <main id="recipes">
    <h2 class="section-title">All Recipes</h2>

    <div class="filters">
      <input class="filter-input" type="search" id="searchInput" placeholder="Search recipes…" aria-label="Search recipes" />
      <button class="filter-btn active" data-difficulty="">All</button>
      <button class="filter-btn" data-difficulty="beginner">Beginner</button>
      <button class="filter-btn" data-difficulty="intermediate">Intermediate</button>
      <button class="filter-btn" data-difficulty="advanced">Advanced</button>
    </div>

    <div id="recipesContainer" class="recipes-grid" aria-live="polite" aria-label="Recipe list"></div>
  </main>

  <footer>
    <p>&copy; <span id="year"></span> Cookie Baking Hub. Made with ❤️ and butter.</p>
  </footer>

  <script src="js/app.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // Mobile nav
    const toggle = document.querySelector('.nav-toggle');
    const navLinks = document.querySelector('.nav-links');
    const overlay = document.querySelector('.nav-overlay');

    function closeNav() {
      toggle.classList.remove('open');
      navLinks.classList.remove('open');
      overlay.classList.remove('open');
      toggle.setAttribute('aria-expanded', 'false');
    }

    toggle.addEventListener('click', () => {
      const open = navLinks.classList.toggle('open');
      toggle.classList.toggle('open', open);
      overlay.classList.toggle('open', open);
      toggle.setAttribute('aria-expanded', String(open));
    });

    overlay.addEventListener('click', closeNav);

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeNav(); });
  </script>
</body>
</html>
