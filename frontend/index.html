<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cookie Baking Hub</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <h1 class="site-title">🍪 Cookie Baking Hub</h1>
      <p class="site-subtitle">Discover delicious cookie recipes for every occasion</p>
    </div>
  </header>

  <main class="main-content">
    <section class="recipes-section">
      <div id="loading" class="loading-state">
        <div class="spinner"></div>
        <p>Loading recipes…</p>
      </div>
      <div id="error" class="error-state hidden">
        <p id="error-message">Something went wrong. Please try again.</p>
      </div>
      <div id="recipe-grid" class="recipe-grid hidden"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2024 Cookie Baking Hub. All rights reserved.</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
